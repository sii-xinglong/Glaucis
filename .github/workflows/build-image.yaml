name: Build & Push Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (default: latest)"
        required: false
        default: "latest"
        type: string

env:
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: tpu-service-473302/glaucis
  IMAGE_NAME: kernel-eval

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/785128357837/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@tpu-service-473302.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}"
          TAG="${{ inputs.image_tag }}"
          docker build \
            --platform linux/amd64 \
            -t "${IMAGE}:${TAG}" \
            -f kernel-evolve/docker/Dockerfile \
            kernel-evolve/docker/
          docker push "${IMAGE}:${TAG}"
          echo "Pushed ${IMAGE}:${TAG}"
