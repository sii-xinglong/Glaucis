kernel:
  name: "fp8_gmm_forward"
  template: "kernels/gmm_fp8_fwd.py"
  reference: "kernels/gmm_fp8_fwd_ref.py"
  evolve_markers:
    start: "# EVOLVE-BLOCK-START"
    end: "# EVOLVE-BLOCK-END"

shapes:
  # up/gate projection: [~8192, 2048] × [32, 2048, 512]
  - { M: 8192, K: 2048, N: 512, num_groups: 32 }
  # down projection: [~8192, 512] × [32, 512, 2048]
  - { M: 8192, K: 512, N: 2048, num_groups: 32 }

correctness:
  method: "allclose"
  rtol: 5e-2
  atol: 5e-2

evolution:
  population_size: 25
  num_islands: 3
  max_generations: 50
  stagnation_limit: 10
  fitness: "speedup"

llm:
  provider: "anthropic"
  model: "claude-sonnet-4-6"
  temperature: 0.7

evaluator:
  type: "kube"
  repo: "sii-xinglong/Glaucis"
  branch: "worktree-buzzing-hatching-hammock"
  namespace: "default"
  job_template: ".github/ci/kernel-eval-job.yaml"
  poll_interval: 15
  timeout: 600

tpu:
  cluster: "tpu7x-cluster"
  zone: "us-central1"
  tpu_type: "tpu7x"
  namespace: "default"
  image: "python:3.12"
  timeout: 300

logging:
  output_dir: "runs/gmm_fp8_fwd_001"
  perf_log: true
  charts: true
