kernel:
  name: "fp8_tgmm_backward"
  template: "kernels/gmm_fp8_bwd.py"
  reference: "kernels/gmm_fp8_bwd_ref.py"
  evolve_markers:
    start: "# EVOLVE-BLOCK-START"
    end: "# EVOLVE-BLOCK-END"

shapes:
  # up/gate weight grad: lhs[8192,2048]^T @ rhs[8192,512] -> [32,2048,512]
  - { M: 8192, K: 2048, N: 512, num_groups: 32 }
  # down weight grad: lhs[8192,512]^T @ rhs[8192,2048] -> [32,512,2048]
  - { M: 8192, K: 512, N: 2048, num_groups: 32 }

correctness:
  method: "allclose"
  rtol: 5e-2
  atol: 5e-2

evolution:
  population_size: 25
  num_islands: 3
  max_generations: 50
  stagnation_limit: 10
  fitness: "speedup"

llm:
  provider: "anthropic"
  model: "claude-sonnet-4-6"
  temperature: 0.7

tpu:
  cluster: "my-gke-cluster"
  zone: "us-central2-b"
  tpu_type: "v4-8"
  namespace: "default"
  image: "gcr.io/my-project/kernel-eval:latest"
  timeout: 300

logging:
  output_dir: "runs/gmm_fp8_bwd_001"
  perf_log: true
  charts: true
