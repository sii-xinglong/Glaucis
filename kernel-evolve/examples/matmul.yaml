kernel:
  name: "tiled_matmul"
  template: "kernels/matmul.py"
  reference: "kernels/matmul_ref.py"
  evolve_markers:
    start: "# EVOLVE-BLOCK-START"
    end: "# EVOLVE-BLOCK-END"

shapes:
  - { M: 1024, N: 1024, K: 1024 }
  - { M: 2048, N: 2048, K: 2048 }

correctness:
  method: "allclose"
  rtol: 1e-2
  atol: 1.0

evolution:
  population_size: 25
  num_islands: 3
  max_generations: 50
  stagnation_limit: 10
  fitness: "speedup"

llm:
  provider: "anthropic"
  model: "claude-sonnet-4-6"
  temperature: 0.7

tpu:
  cluster: "my-gke-cluster"
  zone: "us-central2-b"
  tpu_type: "v4-8"
  namespace: "default"
  image: "gcr.io/my-project/kernel-eval:latest"
  timeout: 300

logging:
  output_dir: "runs/matmul_001"
  perf_log: true
  charts: true
