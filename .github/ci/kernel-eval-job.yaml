# Kernel Evaluation K8s Job Template
# Rendered by envsubst with: $JOB_NAME $BRANCH $REPO $VARIANT_ID
# TPU resources are requested to schedule on TPU nodes
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
  namespace: default
  labels:
    app: kernel-eval
    variant-id: "${VARIANT_ID}"
spec:
  backoffLimit: 0
  activeDeadlineSeconds: ${ACTIVE_DEADLINE}
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: kernel-eval
        job-name: ${JOB_NAME}
      annotations:
        gke-gcsfuse/volumes: "true"
    spec:
      serviceAccountName: kernel-eval
      containers:
      - name: kernel-eval
        image: python:3.12
        command:
        - bash
        - -c
        - |
          set -ex
          pip install uv
          uv pip install --system --prerelease=allow --no-cache \
            jax jaxlib libtpu numpy xprof google-cloud-storage \
            --extra-index-url https://us-python.pkg.dev/ml-oss-artifacts-published/jax/simple/
          git clone --depth=1 --branch="$BRANCH" \
            "https://github.com/$REPO.git" /workspace 2>/dev/null || \
          (git clone "https://github.com/$REPO.git" /workspace && \
           cd /workspace && git checkout "$BRANCH")
          cd /workspace
          uv pip install --system -e kernel-evolve/
          python kernel-evolve/docker/evaluate.py \
            --eval-payload-file /etc/eval-payload/payload \
            --profile-dir /profiles/${JOB_NAME}
        env:
        - name: BRANCH
          value: "${BRANCH}"
        - name: REPO
          value: "${REPO}"
        - name: JOB_NAME
          value: "${JOB_NAME}"
        - name: JAX_PLATFORMS
          value: "tpu,cpu"
        - name: ENABLE_PJRT_COMPATIBILITY
          value: "true"
        - name: LIBTPU_INIT_ARGS
          value: "--xla_enable_custom_call_region_trace=true --xla_xprof_register_llo_debug_info=true"
        resources:
          limits:
            google.com/tpu: "4"
          requests:
            google.com/tpu: "4"
        securityContext:
          privileged: true
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: eval-payload
          mountPath: /etc/eval-payload
          readOnly: true
        - name: gcs-profiles
          mountPath: /profiles
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
      - name: gke-gcsfuse-cache
        emptyDir:
          medium: Memory
      - name: eval-payload
        configMap:
          name: ${JOB_NAME}-payload
      - name: gcs-profiles
        persistentVolumeClaim:
          claimName: glaucis-profiles-pvc
      nodeSelector:
        cloud.google.com/gke-tpu-accelerator: tpu7x
        cloud.google.com/gke-tpu-topology: 2x2x1
      restartPolicy: Never
