name: Kernel Evaluation

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch name or commit SHA to evaluate"
        required: true
        type: string
      eval_payload:
        description: "Base64-encoded evaluation request"
        required: true
        type: string
      variant_id:
        description: "Variant identifier"
        required: true
        type: string

jobs:
  evaluate:
    runs-on: arc-runner-set
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install dependencies
        run: python3 -m pip install --no-cache-dir jax[tpu] numpy -f https://storage.googleapis.com/jax-releases/libtpu_releases.html

      - name: Run evaluation
        run: python3 kernel-evolve/docker/evaluate.py --eval-payload "${{ inputs.eval_payload }}"
